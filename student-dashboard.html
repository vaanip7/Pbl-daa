<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ALL your existing head content -->

  <style>
   :root {
  --accent: #5DCAA5;
  --accent-soft: rgba(93, 202, 165, 0.15);
  --sidebar-bg: #0f1c2e;
  --bg: #f5f5f3;
  --card-bg: #fff;
  --text-main: #1a1a1a;
  --text-muted: #6b6b68;
  --border: rgba(0, 0, 0, 0.08);
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text-main);
}

.app {
  display: flex;
  min-height: 100vh;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 220px;
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  padding: 1.5rem 1rem;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
}

.brand {
  display: flex;
  align-items: center;
  gap: 9px;
  margin-bottom: 2.5rem;
  padding: 0 0.5rem;
}

.brand-mark {
  width: 30px; height: 30px;
  border: 1.5px solid rgba(255,255,255,0.25);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
}

.brand-mark svg { stroke: var(--accent); }

.brand-name {
  font-family: 'DM Serif Display', serif;
  font-size: 18px;
  color: #fff;
}

.nav-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  padding: 0 0.75rem;
  margin: 1.25rem 0 6px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: 8px;
  cursor: pointer;
  color: rgba(255,255,255,0.5);
  font-size: 13px;
  transition: all 0.15s;
  background: none;
  border: none;
  width: 100%;
  text-align: left;
  margin-bottom: 2px;
  font-family: 'DM Sans', sans-serif;
}

.nav-item:hover {
  background: rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.85);
}

.nav-item.active {
  background: var(--accent-soft);
  color: var(--accent);
}

.nav-item svg {
  width: 15px; height: 15px;
  flex-shrink: 0;
}

.sidebar-bottom {
  margin-top: auto;
  border-top: 0.5px solid rgba(255,255,255,0.08);
  padding-top: 1rem;
}

.user-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s;
}

.user-card:hover { background: rgba(255,255,255,0.05); }

.avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--accent-soft);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 500;
  color: var(--accent);
  flex-shrink: 0;
}

.user-info p { font-size: 13px; color: #fff; font-weight: 500; }
.user-info span { font-size: 11px; color: rgba(255,255,255,0.4); }

/* ── MAIN ── */
.main {
  margin-left: 220px;
  flex: 1;
  padding: 2rem 2.5rem;
  max-width: calc(100vw - 220px);
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2rem;
}

.topbar h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 26px;
  font-weight: 400;
}

.topbar p { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

.logout-btn {
  font-size: 12px;
  color: var(--text-muted);
  background: #fff;
  border: 0.5px solid rgba(0,0,0,0.12);
  border-radius: 7px;
  padding: 7px 14px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
}

.logout-btn:hover { background: var(--bg); }

/* ── CARDS & GRID ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 12px;
  margin-bottom: 2rem;
}

.stat-card {
  background: var(--card-bg);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  padding: 1.1rem 1.25rem;
}

.stat-card.highlight { background: var(--sidebar-bg); }

.stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
.stat-value { font-size: 26px; font-weight: 500; line-height: 1; }
.stat-sub   { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

.stat-card.highlight .stat-label,
.stat-card.highlight .stat-sub  { color: rgba(255,255,255,0.35); }
.stat-card.highlight .stat-value { color: var(--accent); }

.content-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
  margin-bottom: 1.5rem;
}

.card {
  background: var(--card-bg);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  padding: 1.25rem 1.5rem;
  margin-bottom: 1.5rem;
}

.card:last-child { margin-bottom: 0; }

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.25rem;
}

.card-title { font-size: 14px; font-weight: 500; }

.card-link { font-size: 12px; color: #378ADD; cursor: pointer; }
.card-link:hover { text-decoration: underline; }

/* ── LIST ── */
.list-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 0.5px solid var(--border);
}

.list-item:last-child { border-bottom: none; padding-bottom: 0; }

.list-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.icon-due  { background: #faeeda; color: #854f0b; }
.icon-done { background: #e1f5ee; color: #0f6e56; }
.icon-late { background: #fcebeb; color: #a32d2d; }
.icon-new,
.icon-note { background: #e6f1fb; color: #185fa5; }

.list-info { flex: 1; }
.list-info p    { font-size: 13px; font-weight: 500; }
.list-info span { font-size: 11px; color: var(--text-muted); }

.badge {
  font-size: 10px; font-weight: 500;
  padding: 3px 8px; border-radius: 20px; white-space: nowrap;
}

.badge.due     { background: #faeeda; color: #854f0b; }
.badge.done    { background: #e1f5ee; color: #0f6e56; }
.badge.late    { background: #fcebeb; color: #a32d2d; }
.badge.new     { background: #e6f1fb; color: #185fa5; }
.badge.present { background: #d1fae5; color: #065f46; }
.badge.absent  { background: #fee2e2; color: #991b1b; }
.badge.late-att{ background: #fef3c7; color: #92400e; }

.btn-sm {
  font-size: 11px;
  color: #378ADD;
  background: #e6f1fb;
  border: none; border-radius: 6px;
  padding: 5px 10px;
  cursor: pointer; font-weight: 500;
  font-family: 'DM Sans', sans-serif;
}

.btn-sm:hover { background: #d0e4f9; }

/* ── SCHEDULE ── */
.schedule-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 0;
  border-bottom: 0.5px solid var(--border);
}

.schedule-row:last-child { border-bottom: none; }

.schedule-time { font-size: 11px; color: var(--text-muted); min-width: 70px; }
.schedule-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.schedule-info p    { font-size: 13px; font-weight: 500; }
.schedule-info span { font-size: 11px; color: var(--text-muted); }

.schedule-room {
  margin-left: auto;
  font-size: 11px; color: var(--text-muted);
  background: var(--bg);
  padding: 3px 8px; border-radius: 6px;
}

/* ── SUBMIT ── */
.upload-area {
  border: 1.5px dashed rgba(0,0,0,0.15);
  border-radius: 10px; padding: 1.5rem;
  text-align: center; cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  margin-bottom: 1rem;
}

.upload-area:hover { border-color: #378ADD; background: #f0f7ff; }
.upload-area p { font-size: 13px; color: var(--text-muted); margin-top: 8px; }

.select-field {
  width: 100%; height: 38px;
  border: 0.5px solid rgba(0,0,0,0.12);
  border-radius: 8px; padding: 0 12px;
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  background: #fff; outline: none;
  margin-bottom: 10px; cursor: pointer;
}

.submit-btn {
  width: 100%; height: 40px;
  background: var(--sidebar-bg); color: #fff;
  border: none; border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500;
  cursor: pointer;
}

.submit-btn:hover { opacity: 0.85; }

/* ── SCORES ── */
.progress-row {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 0;
  border-bottom: 0.5px solid var(--border);
}

.progress-row:last-child { border-bottom: none; }

.progress-label { font-size: 13px; font-weight: 500; min-width: 160px; }

.progress-track {
  flex: 1; background: var(--bg);
  border-radius: 20px; height: 6px; overflow: hidden;
}

.progress-fill { height: 100%; border-radius: 20px; }

.progress-value { font-size: 13px; font-weight: 500; min-width: 40px; text-align: right; }

/* ── ATTENDANCE ── */
.att-summary-grid {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 12px;
  margin-bottom: 1.5rem;
}

.att-sum-card {
  background: var(--card-bg);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  padding: 1rem 1.25rem;
  text-align: center;
}

.att-sum-num   { font-size: 26px; font-weight: 500; line-height: 1; margin-bottom: 4px; }
.att-sum-label { font-size: 11px; color: var(--text-muted); }

.att-progress-row {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 0;
  border-bottom: 0.5px solid var(--border);
}

.att-progress-row:last-child { border-bottom: none; }

.att-progress-label { font-size: 13px; font-weight: 500; min-width: 160px; }

.att-progress-track {
  flex: 1; background: var(--bg);
  border-radius: 20px; height: 6px; overflow: hidden;
}

.att-progress-fill { height: 100%; border-radius: 20px; }

.att-count { font-size: 12px; color: var(--text-muted); min-width: 40px; text-align: center; }

.att-pct {
  font-size: 11px; font-weight: 500;
  padding: 3px 8px; border-radius: 6px;
  min-width: 42px; text-align: center;
  display: inline-block;
}

.att-pct.good { background: #d1fae5; color: #065f46; }
.att-pct.ok   { background: #fef3c7; color: #92400e; }
.att-pct.low  { background: #fee2e2; color: #991b1b; }

.att-table {
  width: 100%; border-collapse: collapse; font-size: 13px;
}

.att-table th {
  background: #f5f5f3;
  padding: 9px 12px;
  text-align: left;
  font-size: 11px; font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.03em;
  border-bottom: 1px solid var(--border);
}

.att-table td {
  padding: 10px 12px;
  border-bottom: 1px solid rgba(0,0,0,0.04);
  vertical-align: middle;
}

.att-table tr:last-child td { border-bottom: none; }
.att-table tr:hover td { background: #fafaf9; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  opacity: 0; visibility: hidden;
  transition: all 0.2s;
}

.modal-overlay.open { opacity: 1; visibility: visible; }

.modal {
  background: #fff; border-radius: 12px;
  padding: 2rem; width: 100%; max-width: 400px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.1);
  transform: translateY(10px); transition: transform 0.2s;
}

.modal-overlay.open .modal { transform: translateY(0); }

.modal h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 20px; margin-bottom: 1.5rem;
}

.form-group { margin-bottom: 1rem; }

.form-label {
  display: block; font-size: 12px; font-weight: 500;
  color: var(--text-muted); margin-bottom: 6px;
}

.form-input {
  width: 100%; height: 40px;
  border: 1px solid #ddd; border-radius: 8px;
  padding: 0 12px; font-size: 13px;
  font-family: 'DM Sans', sans-serif;
}

.color-options { display: flex; gap: 10px; margin-top: 5px; }

.color-opt {
  width: 28px; height: 28px; border-radius: 50%;
  cursor: pointer; border: 2px solid transparent;
  transition: transform 0.15s;
}

.color-opt:hover { transform: scale(1.1); }
.color-opt.active { border-color: var(--text-main); }

.btn-save {
  width: 100%; height: 40px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 8px;
  font-weight: 500; cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  margin-top: 1rem;
}

.btn-cancel {
  background: transparent; color: var(--text-muted);
  border: none; cursor: pointer;
  font-size: 12px; margin-top: 0.5rem;
  display: block; width: 100%; text-align: center;
  font-family: 'DM Sans', sans-serif;
}

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .stats-grid    { grid-template-columns: 1fr 1fr; }
  .content-grid  { grid-template-columns: 1fr; }
  .att-summary-grid { grid-template-columns: 1fr 1fr; }
}

@media (max-width: 640px) {
  .sidebar { display: none; }
  .main    { margin-left: 0; max-width: 100vw; padding: 1.25rem; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .att-summary-grid { grid-template-columns: 1fr 1fr; }
  .progress-label, .att-progress-label { min-width: 100px; font-size: 12px; }
}
  </style>
</head>

// ── HELPERS ──
const statusLabel = { due:'Due soon', done:'Submitted', late:'Late', new:'New' };
const iconClass   = s => ({ due:'icon-due', done:'icon-done', late:'icon-late', new:'icon-new' }[s]);

const attPctClass = pct => pct >= 80 ? 'good' : pct >= 75 ? 'ok' : 'low';

const attStatusBadge = status => {
  const map = {
    present: '<span class="badge present">Present</span>',
    absent:  '<span class="badge absent">Absent</span>',
    late:    '<span class="badge late-att">Late</span>'
  };
  return map[status] || '';
};

// ── TEMPLATES ──
const assignmentRow = a => `
  <div class="list-item">
    <div class="list-icon ${iconClass(a.status)}">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
        ${a.status === 'done'
          ? '<path d="M3 8l3.5 3.5L13 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>'
          : '<path d="M3 2h10a1 1 0 011 1v10a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1z" stroke="currentColor" stroke-width="1.3"/><path d="M5 6h6M5 9h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>'}
      </svg>
    </div>
    <div class="list-info"><p>${a.title}</p><span>${a.meta}</span></div>
    <span class="badge ${a.status}">${statusLabel[a.status]}</span>
  </div>`;

const noteRow = n => `
  <div class="list-item">
    <div class="list-icon icon-note">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M2 3h12v10H2z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M5 6h6M5 9h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
    </div>
    <div class="list-info"><p>${n.title}</p><span>${n.subject} • ${n.size} PDF</span></div>
    <button class="btn-sm">Download</button>
  </div>`;

const scheduleRow = s => `
  <div class="schedule-row">
    <span class="schedule-time">${s.time}</span>
    <div class="schedule-dot" style="background:${s.color}"></div>
    <div class="schedule-info"><p>${s.subject}</p><span>${s.prof}</span></div>
    <span class="schedule-room">${s.room}</span>
  </div>`;

const scoreRow = s => `
  <div class="progress-row">
    <span class="progress-label">${s.sub}</span>
    <div class="progress-track">
      <div class="progress-fill" style="width:${s.score}%;background:${s.color}"></div>
    </div>
    <span class="progress-value">${s.score}%</span>
  </div>`;

const attSubjectRow = s => {
  const pct = Math.round((s.attended / s.total) * 100);
  const cls = attPctClass(pct);
  return `
    <div class="att-progress-row">
      <span class="att-progress-label">${s.name}</span>
      <div class="att-progress-track">
        <div class="att-progress-fill" style="width:${pct}%;background:${s.color}"></div>
      </div>
      <span class="att-count">${s.attended}/${s.total}</span>
      <span class="att-pct ${cls}">${pct}%</span>
    </div>`;
};

const attRecordRow = r => `
  <tr>
    <td style="color:var(--text-muted);font-size:12px;">${r.date}</td>
    <td style="font-weight:500;">${r.subject}</td>
    <td style="color:var(--text-muted);">${r.faculty}</td>
    <td>${attStatusBadge(r.status)}</td>
  </tr>`;

    sub: 'Download materials uploaded by your faculty',

  }),

  schedule: () => ({
    title: 'Timetable',
    sub: 'Your weekly class schedule',
    html: `
      <div class="card">
        <div class="card-header"><span class="card-title">Weekly Timetable</span></div>

  }),

  scores: () => ({

        <div class="card-header">

  attendance: () => {

          <div class="att-sum-card">

            <div class="att-sum-label">Absent</div>

          <div class="att-sum-card">

        <div class="card">
          <div class="card-header">

              <div style="width:${overall}%;height:100%;background:var(--sidebar-bg);border-radius:20px;"></div>

        <div class="card">

          </div>
          <table class="att-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Subject</th>
                <th>Faculty</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>

  },

  submit: () => ({
    title: 'Submit Work',
    sub: 'Upload your assignment files here',
    html: `
      <div class="card" style="max-width:520px">
        <div class="card-header"><span class="card-title">Submit Assignment</span></div>
        <select class="select-field">
          <option>Select subject...</option>
          ${[...new Set(state.assignments.map(a => a.title.split('—')[0].trim()))].map(s => `<option>${s}</option>`).join('')}

// ── NAVIGATION ──
function nav(section) {
  document.querySelectorAll('.nav-item').forEach(b => {
    b.classList.toggle('active', b.dataset.section === section);
  });
  const p = pages[section]();
  document.getElementById('page-title').innerText  = p.title;
  document.getElementById('page-sub').innerText    = p.sub;
  document.getElementById('dynamic-content').innerHTML = p.html;
}

// ── SETTINGS ──
function openSettings() {
  document.getElementById('input-name').value    = state.user.name;
  document.getElementById('input-program').value = state.user.program;
  document.querySelectorAll('.color-opt').forEach(o =>
    o.classList.toggle('active', o.dataset.color === state.user.accent));
  document.getElementById('settings-modal').classList.add('open');
}

function closeSettings() {
  document.getElementById('settings-modal').classList.remove('open');
}

function saveSettings() {
  state.user.name    = document.getElementById('input-name').value    || 'Student';
  state.user.program = document.getElementById('input-program').value || 'Program';
  localStorage.setItem('unishare_settings', JSON.stringify(state.user));
  updateUser();
  closeSettings();
  nav('dashboard');
}

function applyAccent(c) {
  if (!c) return;
  document.documentElement.style.setProperty('--accent', c);
  document.documentElement.style.setProperty('--accent-soft', c + '25');
}

function updateUser() {
  const initials = state.user.name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase();
  document.getElementById('avatar-display').innerText      = initials || 'ST';
  document.getElementById('user-display-name').innerText   = state.user.name    || 'Student';
  document.getElementById('user-display-program').innerText= state.user.program || 'B.Tech — CSE';
}

function logout() {
  localStorage.removeItem('unishare_settings');
  window.location.href = 'login.html';
}

document.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('unishare_settings');
  if (saved) {
    Object.assign(state.user, JSON.parse(saved));
    applyAccent(state.user.accent);
  }

  // Read name from login if available
  const loginName = localStorage.getItem('userName');
  if (loginName) state.user.name = loginName;

  updateUser();
  nav('dashboard');

  document.querySelectorAll('.nav-item').forEach(b =>
    b.addEventListener('click', () => nav(b.dataset.section)));

  document.querySelectorAll('.color-opt').forEach(o =>
    o.addEventListener('click', function() {
      document.querySelectorAll('.color-opt').forEach(x => x.classList.remove('active'));
      this.classList.add('active');
      state.user.accent = this.dataset.color;
      applyAccent(state.user.accent);
    }));
});
  </script>
